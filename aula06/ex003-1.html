<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa...</title>
    <style>
        body {
            background-color: rgb(105, 105, 173);
            color: white;
            font: normal 20pt Arial;
        }

        h1 {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>

    <script>
        // Conversão para número inteiro
        var n1 = Number.parseInt(prompt('Digite um número:')) //String -> Number

        // Conversão para número inteiro
        var n2 = Number.parseInt(prompt('Digite outro número: ')) // String -> Number
        var s = n1 + n2
        window.alert('A soma dos valores é ' + s) // Concatenação
        // (number + number) para adição
        // (string + string) para concatenação 
    </script> 
</body>
</html>
